  - combLevels
  - dummy
  - mReplace
  - nf
  - recodeX
  - revCode
  - stringsAsFactors
  # data.reshape -- Long/wide reshaping, splitting, table expansion
  - collapseTable
  - "`long-wide-reshape`"
  - splitAt
  - splitX
  - toLong
  - toWide
  - untable
  # data.order -- Sorting and reversing
  - binaryTree
  - revX
  - sortX
  # data.append -- Appending columns and merging objects
  - appendEnum
  - appendRowNames
  - appendX
  - multMerge
  # data.interval -- Range containment and interval arithmetic
  - between-operators
  - range-operators
  - distance
  - intervals
  - overlap
  - overlaps
  # data.equal -- Comparison and identity checks
  - allDuplicated
  - allIdentical
  - compareDataFrames
