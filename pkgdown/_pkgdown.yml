

home:
  title: bedrock
  description: Base functions for the DescToolsX ecosystem

destination: docs

development:
  mode: auto

template:
  default_assets: true
  bootstrap: 5
  params:
  bootswatch: flatly

navbar:
  structure:
    left:  [version, home, intro, reference, articles, tutorials, news]
    right: [github]
  components:
    version:
      icon: fa-book
      menu:
      - text: "Documentation for version of package:"
      - text: Released
        href: https://andrisignorell.github.io/bedrock/
      - text: In-development
        href: https://andrisignorell.github.io/bedrock/dev/
    articles:
      text: Tutorials
      menu:
        - text: "PDF:"
        - text: 'Combinatorics'
          href:  https://github.com/AndriSignorell/bedrock/blob/main/vignettes/Combinatorics.pdf

# About package ==============================================================
